<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="YUCONG 制作的国风文化导览移动端 UI 框架。" />
    <title>YUCONG Heritage UI Framework</title>
    <style>
      :root {
        --paper: #f2ecdd;
        --paper-2: #fbf6ea;
        --ink: #2c2822;
        --brown: #5b382e;
        --brown-dark: #2a1e19;
        --vermilion: #963925;
        --gold: #b58c4c;
        --line: #d6cab7;
        --muted: #bdb29f;
        --shadow: 0 30px 70px rgba(66, 49, 32, .16);
      }
      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          linear-gradient(90deg, rgba(102,82,56,.025) 1px, transparent 1px),
          linear-gradient(rgba(102,82,56,.025) 1px, transparent 1px),
          radial-gradient(circle at 76% 12%, rgba(191,162,112,.2), transparent 24%),
          var(--paper);
        background-size: 48px 48px, 48px 48px, auto, auto;
        font-family: "Noto Sans SC", "Microsoft YaHei UI", sans-serif;
      }
      button { font: inherit; }
      button:focus-visible, [tabindex]:focus-visible { outline: 2px solid var(--vermilion); outline-offset: 4px; }
      .stage { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 70px 0 56px; }
      .masthead { display: grid; grid-template-columns: 18px minmax(0, 520px) 1fr; gap: 20px; align-items: start; }
      .seal-line { width: 18px; height: 130px; border-radius: 9px; background: var(--vermilion); }
      .title-stack { display: grid; gap: 14px; padding-top: 8px; }
      .bar { display: block; height: 10px; border-radius: 99px; background: var(--muted); }
      .title-stack .bar:first-child { width: min(100%, 520px); height: 62px; border-radius: 8px; background: var(--ink); }
      .title-stack .bar:nth-child(2) { width: 68%; height: 26px; }
      .title-stack .bar:nth-child(3) { width: 42%; background: #d5cab7; }
      .cloud-grid { justify-self: end; display: grid; grid-template-columns: repeat(3, 64px); gap: 48px 18px; padding-top: 8px; }
      .cloud-grid i { width: 64px; height: 14px; border-radius: 99px; background: #d9ceb9; }

      .phones { margin-top: 76px; display: grid; grid-template-columns: repeat(2, minmax(0, 520px)); justify-content: center; gap: 34px; perspective: 1600px; }
      .phone {
        position: relative; height: 800px; overflow: hidden; border: 1px solid var(--line); border-radius: 52px; background: var(--paper-2);
        box-shadow: var(--shadow); transform: rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)) translateY(var(--lift, 0));
        transition: transform 180ms ease, box-shadow 180ms ease;
      }
      .phone:hover { --lift: -5px; box-shadow: 0 36px 90px rgba(66,49,32,.2); }
      .status { height: 58px; padding: 20px 28px 0; display: flex; justify-content: space-between; }
      .status .bar { width: 48px; background: #5f574b; }
      .signals { display: flex; gap: 7px; }
      .signals i { width: 18px; height: 12px; border-radius: 3px; background: #71685b; }
      .signals i:last-child { width: 25px; background: #514b42; }
      .hero { position: relative; height: 270px; overflow: hidden; padding: 22px 34px; background: var(--brown); }
      .hero-brand { width: 132px; height: 18px; margin: 0 auto; background: #eadfce; }
      .menu { position: absolute; top: 18px; right: 28px; width: 46px; height: 28px; border: 0; border-radius: 99px; background: #7e5b4d; cursor: pointer; }
      .hero-copy { display: grid; gap: 13px; width: 250px; margin-top: 48px; }
      .hero-copy .bar:nth-child(1) { width: 122px; height: 56px; background: #e1d4c2; border-radius: 6px; }
      .hero-copy .bar:nth-child(2) { width: 244px; height: 42px; background: #bca691; }
      .hero-copy .bar:nth-child(3) { width: 180px; height: 8px; background: #d2c2af; }
      .hero-copy .bar:nth-child(4) { width: 136px; height: 8px; background: #d2c2af; }
      .architecture { position: absolute; right: 30px; bottom: 26px; width: 176px; height: 74px; border-radius: 6px; background: var(--brown-dark); }
      .architecture::before, .architecture::after { content: ""; position: absolute; left: 18px; height: 17px; border-radius: 4px; background: #34251f; }
      .architecture::before { width: 138px; top: -28px; }
      .architecture::after { width: 98px; left: 38px; top: -52px; background: #493329; }
      .info-strip { height: 88px; padding: 18px 28px; display: grid; grid-template-columns: 1fr 96px; gap: 18px; background: #f8eedc; }
      .line-stack { display: grid; align-content: start; gap: 14px; }
      .line-stack .bar:first-child { height: 15px; background: #6d5d4d; }
      .line-stack .bar:last-child { width: 78%; height: 8px; background: #c7baa7; }
      .quick-grid { padding: 22px 30px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .quick-card, .service-card, .culture-card, .feature, .history { border: 0; cursor: pointer; transition: transform .2s ease, filter .2s ease; }
      .quick-card:hover, .service-card:hover, .culture-card:hover, .feature:hover, .history:hover { transform: translateY(-4px); filter: saturate(1.08); }
      .quick-card { height: 112px; padding: 18px; border-radius: 14px; background: var(--gold); text-align: left; }
      .quick-card:nth-child(2) { background: #e9dcc5; }
      .quick-card .bar:first-child { width: 92px; height: 12px; background: #f7ebd8; }
      .quick-card .bar:last-child { width: 116px; height: 7px; margin-top: 14px; background: #d9c29c; }
      .section-head { padding: 20px 30px 12px; display: flex; justify-content: space-between; }
      .section-head .bar:first-child { width: 124px; height: 15px; background: #51483e; }
      .section-head .bar:last-child { width: 116px; height: 9px; background: #aaa08f; }
      .service-grid { padding: 0 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
      .service-card { height: 54px; padding: 13px 14px; border-radius: 10px; background: #f0e4cf; text-align: left; }
      .service-card .bar { width: 74px; height: 9px; background: #8e7d68; }

      .landscape { position: relative; height: 92px; background: #f4eedf; }
      .landscape::before, .landscape::after { content: ""; position: absolute; bottom: 24px; height: 32px; border-radius: 50%; background: #ddd4c4; }
      .landscape::before { left: 20px; width: 175px; }
      .landscape::after { left: 115px; width: 150px; height: 42px; }
      .landscape .bar { position: relative; z-index: 1; top: 23px; width: 120px; height: 16px; margin: auto; background: #4f463c; }
      .feature { position: relative; width: calc(100% - 56px); height: 160px; margin: 4px 28px 0; padding: 30px 26px; border-radius: 4px; background: var(--vermilion); text-align: left; }
      .feature .bar:nth-child(1) { width: 94px; height: 9px; background: #d9ae92; }
      .feature .bar:nth-child(2) { width: 192px; height: 20px; margin-top: 18px; background: #f2e5d2; }
      .feature .bar:nth-child(3) { width: 132px; height: 8px; margin-top: 14px; background: #c99479; }
      .feature .architecture { right: 26px; bottom: 35px; width: 138px; height: 76px; background: #5d241a; }
      .center-heading { padding-top: 30px; display: grid; justify-items: center; gap: 12px; }
      .center-heading .bar:first-child { width: 184px; height: 18px; background: #554c42; }
      .center-heading .bar:last-child { width: 132px; height: 8px; background: #b7ab99; }
      .culture-grid { padding: 34px 28px 0; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
      .culture-card { height: 164px; padding: 0; overflow: hidden; border-radius: 4px; background: #96673c; }
      .culture-card:nth-child(2) { background: #b7a181; }
      .culture-card:nth-child(3) { background: #7a6b59; }
      .culture-card::after { content: ""; display: block; width: 82px; height: 9px; margin: 140px 14px 0; border-radius: 99px; background: #f2e4d0; }
      .history-heading { width: 168px; height: 18px; margin: 30px auto 20px; background: #544a40; }
      .history { width: calc(100% - 56px); height: 60px; margin: 0 28px; padding: 13px 18px; background: #4a3128; text-align: left; }
      .history .bar:first-child { width: 126px; height: 11px; background: #d4b28d; }
      .history .bar:last-child { width: 180px; height: 6px; margin-top: 10px; background: #9e8068; }
      .bottom-nav { position: absolute; inset: auto 0 0; height: 86px; display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid #ded4c2; background: rgba(251,247,238,.96); backdrop-filter: blur(12px); }
      .nav-button { border: 0; background: transparent; cursor: pointer; display: grid; place-items: center; align-content: center; gap: 10px; }
      .nav-button i { width: 22px; height: 22px; border-radius: 5px; background: #c9bfad; }
      .nav-button .bar { width: 46px; height: 7px; background: #d0c7b7; }
      .nav-button.is-active i { background: var(--gold); }
      .nav-button.is-active .bar { background: #776958; }
      .phone--culture .nav-button.is-active i { background: var(--vermilion); }
      .credit { margin: 42px 0 0; text-align: right; color: #6e6455; font-size: 14px; font-weight: 800; letter-spacing: .12em; }
      @media (max-width: 820px) {
        .stage { width: min(100% - 22px, 560px); padding-top: 34px; }
        .masthead { grid-template-columns: 12px 1fr; }
        .seal-line { width: 12px; height: 100px; }
        .title-stack .bar:first-child { height: 44px; }
        .cloud-grid { display: none; }
        .phones { margin-top: 46px; grid-template-columns: 1fr; gap: 30px; }
        .phone { height: 760px; border-radius: 38px; }
        .bottom-nav { height: 74px; }
      }
      @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } * { transition: none !important; } }
    </style>
  </head>
  <body>
    <main class="stage">
      <header class="masthead" aria-label="UI framework heading">
        <span class="seal-line"></span>
        <div class="title-stack"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
        <div class="cloud-grid" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i></div>
      </header>

      <section class="phones" aria-label="Mobile UI framework screens">
        <article class="phone" tabindex="0" aria-label="Home screen framework">
          <div class="status"><span class="bar"></span><span class="signals"><i></i><i></i><i></i></span></div>
          <section class="hero"><span class="hero-brand bar"></span><button class="menu" aria-label="菜单"></button><div class="hero-copy"><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></div><span class="architecture"></span></section>
          <section class="info-strip"><span class="line-stack"><i class="bar"></i><i class="bar"></i></span><span class="line-stack"><i class="bar"></i><i class="bar"></i></span></section>
          <div class="quick-grid"><button class="quick-card"><i class="bar"></i><i class="bar"></i></button><button class="quick-card"><i class="bar"></i><i class="bar"></i></button></div>
          <div class="section-head"><i class="bar"></i><i class="bar"></i></div>
          <div class="service-grid"><button class="service-card"><i class="bar"></i></button><button class="service-card"><i class="bar"></i></button><button class="service-card"><i class="bar"></i></button><button class="service-card"><i class="bar"></i></button></div>
          <nav class="bottom-nav" aria-label="Home navigation"><button class="nav-button is-active"><i></i><span class="bar"></span></button><button class="nav-button"><i></i><span class="bar"></span></button><button class="nav-button"><i></i><span class="bar"></span></button></nav>
        </article>

        <article class="phone phone--culture" tabindex="0" aria-label="Culture screen framework">
          <div class="status"><span class="bar"></span><span class="signals"><i></i><i></i><i></i></span></div>
          <section class="landscape"><span class="bar"></span></section>
          <button class="feature"><i class="bar"></i><i class="bar"></i><i class="bar"></i><span class="architecture"></span></button>
          <div class="center-heading"><i class="bar"></i><i class="bar"></i></div>
          <div class="culture-grid"><button class="culture-card"></button><button class="culture-card"></button><button class="culture-card"></button></div>
          <span class="history-heading"></span>
          <button class="history"><i class="bar"></i><i class="bar"></i></button>
          <nav class="bottom-nav" aria-label="Culture navigation"><button class="nav-button is-active"><i></i><span class="bar"></span></button><button class="nav-button"><i></i><span class="bar"></span></button><button class="nav-button"><i></i><span class="bar"></span></button></nav>
        </article>
      </section>
      <p class="credit">YUCONG 制作</p>
    </main>
    <script>
      document.querySelectorAll(".bottom-nav").forEach((nav) => {
        nav.querySelectorAll(".nav-button").forEach((button) => button.addEventListener("click", () => {
          nav.querySelectorAll(".nav-button").forEach((item) => item.classList.remove("is-active"));
          button.classList.add("is-active");
        }));
      });
      document.querySelectorAll(".phone").forEach((phone) => {
        phone.addEventListener("pointermove", (event) => {
          const box = phone.getBoundingClientRect();
          const x = (event.clientX - box.left) / box.width - .5;
          const y = (event.clientY - box.top) / box.height - .5;
          phone.style.setProperty("--ry", `${x * 3}deg`);
          phone.style.setProperty("--rx", `${y * -3}deg`);
        });
        phone.addEventListener("pointerleave", () => {
          phone.style.setProperty("--ry", "0deg");
          phone.style.setProperty("--rx", "0deg");
        });
      });
    </script>
  </body>
</html>
