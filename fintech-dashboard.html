<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="yucong fintech dashboard UI framework showcase." />
    <title>yucong fintech dashboard</title>
    <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%236f4df6"/><text x="10" y="42" font-family="Arial,sans-serif" font-size="26" font-weight="900" fill="white">y</text></svg>' />
    <style>
      :root {
        color-scheme: light;
        --page: #e9e4f6;
        --frame: #151418;
        --surface: #ffffff;
        --surface-soft: #faf8ff;
        --panel-soft: #f7f5fb;
        --ink: #111016;
        --muted: #7b7584;
        --line: #e8e3ef;
        --bar: #cfc8d8;
        --bar-dark: #292631;
        --purple: #6f4df6;
        --purple-2: #8d5cff;
        --purple-soft: #efe8ff;
        --cyan: #31c7c9;
        --cyan-soft: #defafa;
        --pink: #ef67b1;
        --pink-soft: #ffe7f3;
        --green: #31c892;
        --green-soft: #dff7ee;
        --blue: #76b9ee;
        --blue-soft: #e5f2ff;
        --gold: #f3b23d;
        --gold-soft: #fff0ca;
        --radius: 16px;
        --shadow: 0 22px 54px rgba(42, 31, 68, 0.08);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-synthesis: none;
        text-rendering: geometricPrecision;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-width: 320px;
        min-height: 100%;
        margin: 0;
      }

      body {
        color: var(--ink);
        background:
          radial-gradient(circle at 7% 5%, rgba(255, 255, 255, 0.82), transparent 24%),
          radial-gradient(circle at 92% 10%, rgba(111, 77, 246, 0.16), transparent 28%),
          var(--page);
      }

      button {
        border: 0;
        padding: 0;
        color: inherit;
        font: inherit;
        cursor: pointer;
      }

      .page-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .device-frame {
        width: min(1500px, 100%);
        min-height: 888px;
        padding: 26px;
        border-radius: 48px;
        background: var(--frame);
        box-shadow:
          0 34px 80px rgba(30, 22, 51, 0.22),
          inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .app-window {
        min-height: 836px;
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
        overflow: hidden;
        border-radius: 28px;
        background: var(--surface);
      }

      .sidebar {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 28px;
        padding: 34px 22px 0;
        border-right: 1px solid var(--line);
        background: #fdfcff;
      }

      .brand,
      .mobile-brand {
        color: #0d0c12;
        font-size: 31px;
        line-height: 1;
        font-weight: 900;
        letter-spacing: 0;
      }

      .side-nav {
        display: grid;
        gap: 7px;
      }

      .side-nav-item,
      .logout-row {
        min-height: 40px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 12px;
        border-radius: 8px;
        background: transparent;
        color: #17151d;
      }

      .side-nav-item.is-active {
        min-height: 42px;
        color: white;
        background: linear-gradient(135deg, var(--purple), var(--purple-2));
      }

      .side-nav-item:hover,
      .logout-row:hover {
        background: var(--surface-soft);
      }

      .side-nav-item.is-active:hover {
        background: linear-gradient(135deg, var(--purple), var(--purple-2));
      }

      .icon {
        position: relative;
        width: 18px;
        height: 18px;
        display: inline-grid;
        place-items: center;
        flex: 0 0 18px;
      }

      .icon::before,
      .icon::after {
        content: "";
        position: absolute;
        border-color: currentColor;
      }

      .icon-grid::before {
        inset: 2px;
        border: 2px solid currentColor;
        border-radius: 4px;
        background:
          linear-gradient(currentColor, currentColor) center/2px 100% no-repeat,
          linear-gradient(90deg, currentColor, currentColor) center/100% 2px no-repeat;
      }

      .icon-card::before,
      .icon-wallet::before {
        inset: 3px 1px;
        border: 2px solid currentColor;
        border-radius: 4px;
      }

      .icon-card::after {
        left: 4px;
        right: 4px;
        top: 8px;
        border-top: 2px solid currentColor;
      }

      .icon-transfer::before,
      .icon-transfer::after {
        width: 12px;
        height: 2px;
        background: currentColor;
        border: 0;
      }

      .icon-transfer::before {
        top: 5px;
        right: 2px;
        box-shadow: -4px 4px 0 currentColor;
      }

      .icon-transfer::after {
        bottom: 5px;
        left: 2px;
      }

      .icon-circle::before {
        inset: 2px;
        border: 2px solid currentColor;
        border-radius: 50%;
      }

      .icon-circle::after {
        width: 2px;
        height: 7px;
        top: 5px;
        left: 8px;
        background: currentColor;
        border: 0;
        transform-origin: bottom;
        transform: rotate(36deg);
      }

      .icon-chart::before {
        left: 3px;
        right: 3px;
        bottom: 3px;
        height: 12px;
        border-left: 2px solid currentColor;
        border-bottom: 2px solid currentColor;
      }

      .icon-chart::after {
        width: 12px;
        height: 8px;
        left: 4px;
        bottom: 5px;
        border-left: 2px solid currentColor;
        border-top: 2px solid currentColor;
        transform: skewY(-30deg);
      }

      .icon-gear::before {
        inset: 2px;
        border: 2px solid currentColor;
        border-radius: 50%;
        box-shadow: 0 -4px 0 -2px currentColor, 0 4px 0 -2px currentColor, 4px 0 0 -2px currentColor, -4px 0 0 -2px currentColor;
      }

      .icon-help::before {
        inset: 2px;
        border: 2px solid currentColor;
        border-radius: 50%;
      }

      .icon-help::after {
        width: 3px;
        height: 3px;
        left: 8px;
        bottom: 4px;
        border-radius: 50%;
        background: currentColor;
        border: 0;
      }

      .icon-logout::before {
        inset: 3px 7px 3px 1px;
        border: 2px solid currentColor;
        border-radius: 3px;
      }

      .icon-logout::after {
        right: 1px;
        top: 8px;
        width: 10px;
        height: 2px;
        background: currentColor;
        border: 0;
      }

      .bar {
        width: var(--w, 80px);
        max-width: 100%;
        height: var(--h, 10px);
        display: block;
        flex: 0 0 auto;
        border-radius: 999px;
        background: var(--bar);
      }

      .bar.light {
        background: rgba(255, 255, 255, 0.84);
      }

      .bar.dark {
        background: var(--bar-dark);
      }

      .bar.purple {
        background: var(--purple);
      }

      .bar.success {
        background: #0eb879;
      }

      .side-nav-item:not(.is-active) .bar,
      .logout-row .bar {
        background: #26232d;
        opacity: 0.88;
      }

      .side-nav-item.is-active .bar {
        background: rgba(255, 255, 255, 0.86);
      }

      .sidebar-promo {
        display: grid;
        gap: 10px;
        margin-top: auto;
        padding: 20px;
        border-radius: var(--radius);
        background:
          linear-gradient(135deg, rgba(111, 77, 246, 0.1), rgba(255, 255, 255, 0.74)),
          #f7f2ff;
      }

      .promo-icon,
      .crown-badge,
      .security-icon {
        display: grid;
        place-items: center;
        color: white;
        background: linear-gradient(135deg, var(--purple), var(--purple-2));
      }

      .promo-icon {
        width: 30px;
        height: 30px;
        border-radius: 8px;
      }

      .crown-mark,
      .shield-mark,
      .plane-mark,
      .home-mark,
      .spark-mark,
      .bag-mark,
      .briefcase-mark,
      .bank-mark,
      .lock-mark {
        position: relative;
        width: 18px;
        height: 18px;
      }

      .crown-mark::before {
        content: "";
        position: absolute;
        left: 2px;
        right: 2px;
        bottom: 3px;
        height: 8px;
        border-radius: 3px;
        background: currentColor;
        clip-path: polygon(0 100%, 0 32%, 25% 58%, 50% 0, 75% 58%, 100% 32%, 100% 100%);
      }

      .shield-mark::before {
        content: "";
        position: absolute;
        inset: 1px 3px;
        background: currentColor;
        clip-path: polygon(50% 0, 100% 18%, 88% 72%, 50% 100%, 12% 72%, 0 18%);
      }

      .plane-mark::before {
        content: "";
        position: absolute;
        inset: 2px;
        background: currentColor;
        clip-path: polygon(0 42%, 100% 0, 58% 100%, 45% 58%, 18% 66%);
      }

      .home-mark::before {
        content: "";
        position: absolute;
        inset: 3px 2px 1px;
        border: 2px solid currentColor;
        border-top: 0;
      }

      .home-mark::after {
        content: "";
        position: absolute;
        left: 3px;
        top: 2px;
        width: 12px;
        height: 12px;
        border-left: 2px solid currentColor;
        border-top: 2px solid currentColor;
        transform: rotate(45deg);
      }

      .spark-mark::before {
        content: "";
        position: absolute;
        inset: 1px;
        background: currentColor;
        clip-path: polygon(50% 0, 62% 36%, 100% 50%, 62% 64%, 50% 100%, 38% 64%, 0 50%, 38% 36%);
      }

      .bag-mark::before,
      .briefcase-mark::before {
        content: "";
        position: absolute;
        inset: 5px 2px 2px;
        border: 2px solid currentColor;
        border-radius: 4px;
      }

      .bag-mark::after,
      .briefcase-mark::after {
        content: "";
        position: absolute;
        left: 6px;
        right: 6px;
        top: 3px;
        height: 6px;
        border: 2px solid currentColor;
        border-bottom: 0;
        border-radius: 7px 7px 0 0;
      }

      .bank-mark::before {
        content: "";
        position: absolute;
        inset: 6px 2px 2px;
        border-left: 2px solid currentColor;
        border-right: 2px solid currentColor;
        box-shadow: 5px 0 0 -3px currentColor, 10px 0 0 -3px currentColor;
      }

      .bank-mark::after {
        content: "";
        position: absolute;
        left: 1px;
        right: 1px;
        top: 2px;
        border-bottom: 2px solid currentColor;
        transform: skewX(-28deg);
      }

      .lock-mark::before {
        content: "";
        position: absolute;
        inset: 8px 3px 2px;
        border-radius: 3px;
        background: currentColor;
      }

      .lock-mark::after {
        content: "";
        position: absolute;
        left: 5px;
        right: 5px;
        top: 2px;
        height: 8px;
        border: 2px solid currentColor;
        border-bottom: 0;
        border-radius: 8px 8px 0 0;
      }

      .promo-copy {
        display: grid;
        gap: 7px;
        margin: 4px 0 8px;
      }

      .dark-pill,
      .premium-button {
        min-height: 36px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: #08070a;
      }

      .logout-row {
        min-height: 62px;
        margin: 0 -22px;
        padding: 0 34px;
        border-top: 1px solid var(--line);
        border-radius: 0;
      }

      .content-shell {
        min-width: 0;
        display: flex;
        flex-direction: column;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(252, 250, 255, 0.92)),
          #fff;
      }

      .topbar {
        min-height: 92px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 24px;
        padding: 26px 34px 14px;
      }

      .mobile-brand {
        display: none;
      }

      .top-tabs {
        width: fit-content;
        max-width: 100%;
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 6px;
        overflow-x: auto;
        border-radius: 9px;
        background: #f6f5f9;
      }

      .top-tab {
        min-width: 98px;
        height: 40px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: transparent;
      }

      .top-tab:nth-child(3) {
        min-width: 138px;
      }

      .top-tab.is-active {
        background: linear-gradient(135deg, var(--purple), var(--purple-2));
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 18px;
      }

      .search-control {
        width: 235px;
        height: 43px;
        display: grid;
        grid-template-columns: 18px minmax(0, 1fr) 18px;
        align-items: center;
        gap: 10px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: white;
        color: #1c1a22;
      }

      .search-icon {
        position: relative;
        width: 17px;
        height: 17px;
      }

      .search-icon::before {
        content: "";
        position: absolute;
        inset: 2px 4px 5px 2px;
        border: 2px solid currentColor;
        border-radius: 50%;
      }

      .search-icon::after {
        content: "";
        position: absolute;
        width: 7px;
        height: 2px;
        right: 1px;
        bottom: 2px;
        background: currentColor;
        transform: rotate(45deg);
      }

      .icon-button,
      .profile-button {
        position: relative;
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 14px;
        color: #08070a;
        background: transparent;
      }

      .bell-button {
        background: white;
      }

      .bell {
        position: relative;
        width: 18px;
        height: 18px;
      }

      .bell::before {
        content: "";
        position: absolute;
        left: 4px;
        right: 4px;
        top: 2px;
        height: 11px;
        border: 2px solid currentColor;
        border-bottom: 0;
        border-radius: 10px 10px 2px 2px;
      }

      .bell::after {
        content: "";
        position: absolute;
        left: 2px;
        right: 2px;
        bottom: 3px;
        height: 2px;
        background: currentColor;
        box-shadow: 6px 4px 0 -1px currentColor;
      }

      .notify-dot {
        position: absolute;
        top: 6px;
        right: 7px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--purple);
      }

      .profile-button {
        width: 82px;
        grid-template-columns: 46px 16px;
        gap: 6px;
      }

      .profile-core {
        width: 46px;
        height: 46px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: var(--purple-soft);
      }

      .profile-core .bar {
        background: var(--purple);
      }

      .chevron {
        width: 9px;
        height: 9px;
        border-right: 2px solid currentColor;
        border-bottom: 2px solid currentColor;
        transform: rotate(45deg);
      }

      .status-strip {
        display: none;
      }

      .dashboard-layout {
        display: grid;
        grid-template-columns: minmax(390px, 1.38fr) minmax(280px, 0.93fr) minmax(320px, 1.14fr);
        gap: 18px;
        padding: 12px 34px 26px;
      }

      .dashboard-column {
        min-width: 0;
        display: grid;
        align-content: start;
        gap: 18px;
      }

      .card-shell {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.9);
        box-shadow: var(--shadow);
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .small-outline,
      .select-pill {
        border: 1px solid var(--line);
        background: white;
      }

      .small-outline {
        border-radius: 12px;
      }

      .plus {
        position: relative;
        width: 16px;
        height: 16px;
      }

      .plus::before,
      .plus::after {
        content: "";
        position: absolute;
        left: 7px;
        top: 2px;
        width: 2px;
        height: 12px;
        background: currentColor;
      }

      .plus::after {
        transform: rotate(90deg);
      }

      .balance-card {
        min-height: 432px;
        padding: 26px 18px 18px;
      }

      .balance-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
        padding: 0 2px;
      }

      .label-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .eye {
        position: relative;
        width: 16px;
        height: 16px;
      }

      .eye::before {
        content: "";
        position: absolute;
        inset: 3px 1px;
        border: 2px solid currentColor;
        border-radius: 50%;
        transform: scaleX(1.45);
      }

      .eye::after {
        content: "";
        position: absolute;
        left: 6px;
        top: 6px;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: currentColor;
      }

      .amount-block {
        height: 30px;
        margin: 18px 0 14px;
        border-radius: 8px;
        background: #111015;
      }

      .trend-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .trend-pill {
        height: 24px;
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 0 8px;
        border-radius: 999px;
        color: #039a6c;
        background: #c8f5e7;
      }

      .down-arrow {
        width: 10px;
        height: 10px;
        border-left: 2px solid currentColor;
        border-bottom: 2px solid currentColor;
        transform: rotate(-45deg);
      }

      .trend-pill .bar {
        background: #039a6c;
      }

      .select-pill {
        min-width: 104px;
        height: 33px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border-radius: 8px;
      }

      .select-pill.compact {
        min-width: 96px;
      }

      .chart-area {
        position: relative;
        min-height: 205px;
        display: grid;
        grid-template-columns: 38px minmax(0, 1fr);
        align-items: end;
        margin-top: 20px;
      }

      .axis-bars {
        height: 176px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding-bottom: 8px;
      }

      .axis-bars .bar {
        background: #a9a3b0;
        opacity: 0.72;
      }

      .balance-svg {
        width: 100%;
        height: 205px;
        overflow: visible;
      }

      .chart-popover {
        position: absolute;
        right: 52px;
        top: 18px;
        display: grid;
        gap: 8px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 16px 30px rgba(42, 33, 58, 0.12);
      }

      .metric-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 16px;
      }

      .metric-card {
        min-height: 68px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        border-radius: 10px;
        background: var(--panel-soft);
      }

      .metric-card > div {
        display: grid;
        gap: 8px;
      }

      .metric-icon,
      .goal-icon,
      .budget-icon {
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        border-radius: 50%;
      }

      .metric-icon {
        width: 32px;
        height: 32px;
      }

      .cards-panel {
        min-height: 322px;
        padding: 24px 20px 18px;
      }

      .credit-preview {
        position: relative;
        height: 164px;
        display: grid;
        gap: 18px;
        margin-top: 22px;
        padding: 20px 18px;
        border-radius: 8px;
        color: white;
        background:
          radial-gradient(circle at 78% 8%, rgba(255, 255, 255, 0.28), transparent 28%),
          linear-gradient(135deg, #5d34eb 0%, #7247f5 48%, #a37cff 100%);
      }

      .contactless {
        position: absolute;
        right: 20px;
        top: 24px;
        width: 18px;
        height: 24px;
        border-right: 3px solid rgba(255, 255, 255, 0.82);
        border-radius: 50%;
      }

      .chip {
        width: 32px;
        height: 24px;
        margin-top: 8px;
        border-radius: 7px;
        background:
          linear-gradient(90deg, transparent 48%, rgba(90, 83, 105, 0.35) 49%, rgba(90, 83, 105, 0.35) 51%, transparent 52%),
          linear-gradient(#f3f0e4, #c7c1b5);
      }

      .card-caption {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 14px;
      }

      .card-caption > div {
        display: grid;
        gap: 8px;
      }

      .more-dots {
        width: 22px;
        height: 6px;
        border-radius: 999px;
        background:
          radial-gradient(circle at 3px 3px, currentColor 0 2px, transparent 2.5px),
          radial-gradient(circle at 11px 3px, currentColor 0 2px, transparent 2.5px),
          radial-gradient(circle at 19px 3px, currentColor 0 2px, transparent 2.5px);
      }

      .pager-dots {
        display: flex;
        justify-content: center;
        gap: 9px;
        margin-top: 16px;
      }

      .pager-dots button,
      .pager-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #c8c4ce;
      }

      .pager-dots .is-active {
        background: var(--purple);
      }

      .premium-panel {
        min-height: 270px;
        display: grid;
        align-content: start;
        gap: 18px;
        padding: 26px 20px 22px;
        background:
          radial-gradient(circle at 88% 18%, rgba(111, 77, 246, 0.16), transparent 28%),
          linear-gradient(135deg, #fff 0%, #f6f0ff 100%);
      }

      .premium-head {
        display: flex;
        justify-content: space-between;
        gap: 20px;
      }

      .premium-head > div:first-child {

          border-radius: 24px;
        }

        .sidebar {

        }

        .topbar {

        }

        .mobile-menu {

        }

          grid-template-columns: 1fr;
          padding: 18px;
        }

        .balance-card {

      }

      @media (max-width: 560px) {

        .search-control {

        .metric-strip,

        .people-row,

          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .person,

        }

        .chart-area {
          grid-template-columns: 1fr;
        }

        .axis-bars {

        .transaction-row {

        }

        .transaction-row > .bar {
          grid-column: 2;
        }

        .budget-row {
          grid-template-columns: 28px 82px minmax(90px, 1fr);
        }

        .budget-row > .bar:last-child {
          grid-column: 2 / -1;
        }
      }

    </main>

    <script>
      const activateWithin = (buttons, activeClass) => {
        buttons.forEach((button) => {
          button.addEventListener("click", () => {
            buttons.forEach((item) => {
              item.classList.remove(activeClass);
              if (item.hasAttribute("aria-selected")) item.setAttribute("aria-selected", "false");
            });
            button.classList.add(activeClass);
            if (button.hasAttribute("aria-selected")) button.setAttribute("aria-selected", "true");
          });
        });
      };

      activateWithin(document.querySelectorAll(".side-nav-item"), "is-active");
      activateWithin(document.querySelectorAll(".top-tab"), "is-active");
      activateWithin(document.querySelectorAll(".person"), "is-active");
      activateWithin(document.querySelectorAll(".pager-dots button"), "is-active");
    </script>
