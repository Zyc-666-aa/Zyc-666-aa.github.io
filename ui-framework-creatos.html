<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="YUCONG 制作的可视化 AI 工作台 UI 框架研究页。" />
    <title>YUCONG UI Framework 02</title>
    <style>
      :root {
        --bg: #f4f4f2;
        --panel: rgba(255, 255, 255, 0.74);
        --panel-strong: #fafaf8;
        --line: rgba(18, 20, 19, 0.13);
        --ink: #262927;
        --muted: #adb1ad;
        --soft: #d8dad7;
        --accent: #7f8882;
        --shadow: 0 28px 70px rgba(36, 40, 37, 0.09);
        --radius: 26px;
      }

      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at 18% 4%, rgba(255,255,255,.96), transparent 28%),
          linear-gradient(180deg, #f8f8f6 0%, var(--bg) 46%, #eeeeeb 100%);
        font-family: "Microsoft YaHei UI", "PingFang SC", sans-serif;
      }
      button { font: inherit; }
      button:focus-visible, [tabindex]:focus-visible { outline: 2px solid #555d58; outline-offset: 4px; }

      .shell { width: min(1180px, calc(100% - 36px)); margin: 0 auto; }
      .floating-nav {
        position: sticky;
        top: 14px;
        z-index: 20;
        width: min(1180px, calc(100% - 32px));
        height: 64px;
        margin: 14px auto 0;
        padding: 0 20px;
        display: grid;
        grid-template-columns: 160px 1fr 160px;
        align-items: center;
        border: 1px solid rgba(255,255,255,.92);
        border-radius: 999px;
        background: rgba(250,250,248,.67);
        box-shadow: 0 10px 36px rgba(41,45,42,.08), inset 0 0 0 1px var(--line);
        backdrop-filter: blur(22px) saturate(145%);
      }
      .brand-mark { display: flex; align-items: center; gap: 10px; }
      .brand-mark i { width: 30px; height: 30px; border: 2px solid var(--accent); border-radius: 9px; position: relative; }
      .brand-mark i::before, .brand-mark i::after { content: ""; position: absolute; border: 2px solid var(--accent); border-radius: 50%; }
      .brand-mark i::before { inset: 5px; }
      .brand-mark i::after { width: 4px; height: 4px; left: 11px; top: 11px; background: var(--accent); }
      .ghost-line { display: block; height: 9px; border-radius: 999px; background: var(--soft); }
      .brand-mark .ghost-line { width: 76px; height: 13px; background: #9ea49f; }
      .nav-dots { display: flex; justify-content: center; gap: 9px; }
      .nav-dots button {
        width: 54px; height: 28px; border: 0; border-radius: 999px; background: transparent; cursor: pointer; position: relative;
      }
      .nav-dots button::after { content: ""; position: absolute; inset: 10px 8px; border-radius: 99px; background: var(--soft); transition: inset .2s ease, background .2s ease; }
      .nav-dots button:hover::after, .nav-dots button.is-active::after { inset: 8px 5px; background: #929993; }
      .nav-tools { display: flex; justify-content: flex-end; gap: 8px; }
      .icon-button {
        width: 34px; height: 34px; border: 1px solid var(--line); border-radius: 50%; color: #6c736e; background: rgba(255,255,255,.72); cursor: pointer;
      }
      .primary-pill { width: 72px; height: 34px; border: 0; border-radius: 999px; background: #8b938d; cursor: pointer; }

      .hero { min-height: 830px; padding: 150px 0 76px; text-align: center; overflow: hidden; }
      .hero-copy { width: min(760px, 90%); margin: 0 auto 74px; display: grid; justify-items: center; gap: 17px; }
      .eyebrow { width: 178px; height: 28px; border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,.55); }
      .hero-line { height: clamp(42px, 6vw, 72px); border-radius: 12px; background: #858d87; }
      .hero-line.one { width: min(690px, 94%); }
      .hero-line.two { width: min(410px, 64%); background: #b1b6b2; }
      .hero-sub { width: min(460px, 72%); display: grid; gap: 9px; margin-top: 10px; }
      .hero-sub .ghost-line:last-child { width: 72%; justify-self: center; }
      .hero-action { width: 216px; height: 48px; margin-top: 8px; border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,.58); position: relative; }
      .hero-action::before { content: ""; position: absolute; left: 20px; top: 18px; width: 98px; height: 10px; border-radius: 99px; background: var(--soft); }
      .hero-action::after { content: ""; position: absolute; right: 6px; top: 6px; width: 70px; height: 36px; border-radius: 99px; background: #8b938d; }

      .device {
        width: min(1000px, 94vw); height: 460px; margin: 0 auto; padding: 14px; border: 2px solid #707671; border-radius: 36px 36px 0 0;
        background: linear-gradient(145deg, #555a56, #aeb3af 48%, #555b57); box-shadow: var(--shadow);
      }
      .canvas {
        position: relative; height: 100%; overflow: hidden; border-radius: 23px 23px 0 0; cursor: grab;
        background: radial-gradient(circle, rgba(255,255,255,.12) 1px, transparent 1.4px), #171918; background-size: 23px 23px;
      }
      .canvas.is-dragging { cursor: grabbing; }
      .canvas-toolbar { position: absolute; inset: 18px 18px auto; display: flex; justify-content: space-between; pointer-events: none; }
      .tool-cluster { height: 34px; padding: 0 8px; display: flex; align-items: center; gap: 6px; border: 1px solid rgba(255,255,255,.12); border-radius: 999px; background: rgba(34,37,35,.78); }
      .tool-cluster i { width: 17px; height: 17px; border-radius: 50%; background: #6d736f; }
      .canvas-world { position: absolute; inset: 0; transform: translate3d(0,0,0); }
      .node { position: absolute; width: 180px; min-height: 100px; padding: 15px; border: 1px solid rgba(255,255,255,.13); border-radius: 14px; background: rgba(50,54,51,.9); box-shadow: 0 18px 44px rgba(0,0,0,.22); }
      .node::before { content: ""; display: block; width: 52%; height: 8px; margin-bottom: 18px; border-radius: 99px; background: #89908b; }
      .node .ghost-line { height: 6px; margin-top: 8px; background: #5e6460; }
      .node.a { left: 12%; top: 34%; }
      .node.b { left: 42%; top: 22%; width: 210px; }
      .node.c { right: 9%; top: 49%; }
      .connector { position: absolute; height: 1px; transform-origin: left center; background: #616762; opacity: .8; }
      .connector.a { left: 28%; top: 49%; width: 210px; transform: rotate(-12deg); }
      .connector.b { left: 59%; top: 44%; width: 190px; transform: rotate(18deg); }

      .section-intro { min-height: 460px; padding: 160px 0 100px; display: grid; justify-items: center; gap: 15px; text-align: center; }
      .section-intro .wide { width: min(620px, 78vw); height: 48px; background: #9ba19c; }
      .section-intro .short { width: min(360px, 52vw); height: 48px; background: #c2c5c2; }
      .section-intro .copy { width: min(470px, 76vw); display: grid; gap: 9px; margin-top: 12px; }

      .bento { padding: 0 0 140px; display: grid; grid-template-columns: 1.35fr .65fr; gap: 20px; }
      .feature-card {
        min-height: 370px; padding: 24px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); box-shadow: inset 0 1px 0 rgba(255,255,255,.8); cursor: pointer; transition: transform .3s ease, box-shadow .3s ease, border-color .3s ease;
      }
      .feature-card:hover, .feature-card.is-open { transform: translateY(-5px); border-color: rgba(91,99,93,.35); box-shadow: var(--shadow); }
      .feature-card:nth-child(3), .feature-card:nth-child(4) { min-height: 310px; }
      .feature-card:nth-child(4) { grid-column: span 1; }
      .feature-visual { height: 220px; padding: 20px; display: grid; align-content: center; gap: 12px; border-radius: 18px; background: #eceeeb; overflow: hidden; }
      .feature-card.is-open .feature-visual { background: #e5e8e4; }
      .feature-visual .ghost-line:nth-child(1) { width: 78%; }
      .feature-visual .ghost-line:nth-child(2) { width: 58%; }
      .feature-visual .ghost-line:nth-child(3) { width: 88%; }
      .feature-meta { display: grid; grid-template-columns: 28px 1fr; gap: 14px; margin-top: 22px; align-items: start; }
      .feature-meta i { width: 24px; height: 24px; border: 1px solid #9fa49f; border-radius: 7px; }
      .feature-copy { display: grid; gap: 10px; }
      .feature-copy .ghost-line:first-child { width: 42%; height: 12px; background: #929893; }
      .feature-copy .ghost-line:last-child { width: 72%; }
      .feature-card.small-set { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
      .mini-panel { min-height: 125px; padding: 18px; border-radius: 18px; background: #eceeeb; display: grid; align-content: center; gap: 10px; }

      .footer { min-height: 300px; border-top: 1px solid var(--line); display: grid; place-items: center; }
      .credit { padding: 12px 20px; border: 1px solid #aeb2ae; border-radius: 999px; color: #606762; font-size: 13px; font-weight: 800; letter-spacing: .12em; }

      body.dark {
        --bg: #181a19; --panel: rgba(40,43,41,.76); --panel-strong: #202321; --line: rgba(255,255,255,.12); --ink: #eceeeb; --muted: #777d78; --soft: #4c514d; --accent: #a5ada7;
        background: radial-gradient(circle at 18% 4%, #292c2a, transparent 28%), linear-gradient(180deg,#1f2220,#151716);
      }
      body.dark .floating-nav { background: rgba(33,36,34,.72); border-color: rgba(255,255,255,.12); }
      body.dark .icon-button { background: rgba(255,255,255,.06); color: #d9dcd9; }
      body.dark .eyebrow, body.dark .hero-action { background: rgba(255,255,255,.05); }
      body.dark .feature-visual, body.dark .mini-panel { background: #292c2a; }
      body.dark .feature-card.is-open .feature-visual { background: #313532; }

      @media (max-width: 760px) {
        .floating-nav { height: 58px; grid-template-columns: 48px 1fr 82px; padding: 0 12px; }
        .brand-mark .ghost-line, .nav-dots button:nth-child(n+4), .primary-pill { display: none; }
        .nav-dots { gap: 2px; }
        .nav-dots button { width: 35px; }
        .hero { min-height: 670px; padding-top: 115px; }
        .hero-copy { margin-bottom: 48px; }
        .device { height: 330px; padding: 9px; border-radius: 24px 24px 0 0; }
        .canvas { border-radius: 16px 16px 0 0; }
        .node { transform: scale(.74); transform-origin: top left; }
        .node.b { left: 34%; }
        .bento { grid-template-columns: 1fr; }
        .feature-card { min-height: 320px; }
        .feature-card.small-set { min-height: auto; }
      }
      @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } * { transition: none !important; } }
    </style>
  </head>
  <body>
    <header class="floating-nav" aria-label="UI framework navigation">
      <div class="brand-mark" aria-label="Framework mark"><i aria-hidden="true"></i><span class="ghost-line"></span></div>
      <nav class="nav-dots" aria-label="Sections">
        <button class="is-active" data-target="top" aria-label="首屏"></button>
        <button data-target="system" aria-label="系统结构"></button>
        <button data-target="modules" aria-label="模块"></button>
        <button data-target="footer" aria-label="页尾"></button>
      </nav>
      <div class="nav-tools">
        <button class="icon-button" id="theme-toggle" aria-label="切换明暗模式">◐</button>
        <button class="primary-pill" aria-label="主要操作"></button>
      </div>
    </header>

    <main id="top">
      <section class="hero shell" aria-label="Hero framework">
        <div class="hero-copy">
          <div class="eyebrow"></div>
          <div class="hero-line one"></div>
          <div class="hero-line two"></div>
          <div class="hero-sub"><span class="ghost-line"></span><span class="ghost-line"></span></div>
          <div class="hero-action"></div>
        </div>
        <div class="device" aria-label="可拖动的画布框架">
          <div class="canvas" id="canvas" tabindex="0">
            <div class="canvas-toolbar"><span class="tool-cluster"><i></i><i></i></span><span class="tool-cluster"><i></i><i></i><i></i></span></div>
            <div class="canvas-world" id="canvas-world">
              <span class="connector a"></span><span class="connector b"></span>
              <article class="node a"><span class="ghost-line"></span><span class="ghost-line"></span></article>
              <article class="node b"><span class="ghost-line"></span><span class="ghost-line"></span><span class="ghost-line"></span></article>
              <article class="node c"><span class="ghost-line"></span><span class="ghost-line"></span></article>
            </div>
          </div>
        </div>
      </section>

      <section class="section-intro" id="system" aria-label="Section heading framework">
        <span class="ghost-line wide"></span><span class="ghost-line short"></span>
        <div class="copy"><span class="ghost-line"></span><span class="ghost-line"></span></div>
      </section>

      <section class="bento shell" id="modules" aria-label="Bento component framework">
        <article class="feature-card" tabindex="0">
          <div class="feature-visual"><span class="ghost-line"></span><span class="ghost-line"></span><span class="ghost-line"></span></div>
          <div class="feature-meta"><i></i><div class="feature-copy"><span class="ghost-line"></span><span class="ghost-line"></span></div></div>
        </article>
        <article class="feature-card" tabindex="0">
          <div class="feature-visual"><span class="ghost-line"></span><span class="ghost-line"></span><span class="ghost-line"></span></div>
          <div class="feature-meta"><i></i><div class="feature-copy"><span class="ghost-line"></span><span class="ghost-line"></span></div></div>
        </article>
        <article class="feature-card small-set" tabindex="0">
          <div class="mini-panel"><span class="ghost-line"></span><span class="ghost-line"></span></div>
          <div class="mini-panel"><span class="ghost-line"></span><span class="ghost-line"></span></div>
        </article>
        <article class="feature-card" tabindex="0">
          <div class="feature-visual"><span class="ghost-line"></span><span class="ghost-line"></span><span class="ghost-line"></span></div>
          <div class="feature-meta"><i></i><div class="feature-copy"><span class="ghost-line"></span><span class="ghost-line"></span></div></div>
        </article>
      </section>
    </main>

    <footer class="footer" id="footer"><span class="credit">YUCONG 制作</span></footer>

    <script>
      const themeToggle = document.querySelector("#theme-toggle");
      themeToggle.addEventListener("click", () => document.body.classList.toggle("dark"));

      const navButtons = [...document.querySelectorAll("[data-target]")];
      navButtons.forEach((button) => button.addEventListener("click", () => {
        document.querySelector(`#${button.dataset.target}`)?.scrollIntoView({ behavior: "smooth" });
      }));

      const sections = navButtons.map((button) => document.querySelector(`#${button.dataset.target}`));
      const observer = new IntersectionObserver((entries) => {
        const visible = entries.filter((entry) => entry.isIntersecting).sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
        if (!visible) return;
        navButtons.forEach((button) => button.classList.toggle("is-active", button.dataset.target === visible.target.id));
      }, { rootMargin: "-30% 0px -55%", threshold: [0, .2, .5] });
      sections.forEach((section) => section && observer.observe(section));

      document.querySelectorAll(".feature-card").forEach((card) => {
        const toggle = () => card.classList.toggle("is-open");
        card.addEventListener("click", toggle);
        card.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") { event.preventDefault(); toggle(); }
        });
      });

      const canvas = document.querySelector("#canvas");
      const world = document.querySelector("#canvas-world");
      let dragging = false, originX = 0, originY = 0, offsetX = 0, offsetY = 0;
      canvas.addEventListener("pointerdown", (event) => {
        dragging = true; originX = event.clientX - offsetX; originY = event.clientY - offsetY;
        canvas.classList.add("is-dragging"); canvas.setPointerCapture(event.pointerId);
      });
      canvas.addEventListener("pointermove", (event) => {
        if (!dragging) return;
        offsetX = Math.max(-120, Math.min(120, event.clientX - originX));
        offsetY = Math.max(-70, Math.min(70, event.clientY - originY));
        world.style.transform = `translate3d(${offsetX}px, ${offsetY}px, 0)`;
      });
      const stopDrag = () => { dragging = false; canvas.classList.remove("is-dragging"); };
      canvas.addEventListener("pointerup", stopDrag);
      canvas.addEventListener("pointercancel", stopDrag);
    </script>
  </body>
</html>
